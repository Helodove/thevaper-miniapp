<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B9F36C"/>
      <stop offset="50%" stop-color="#3FD4C2"/>
      <stop offset="100%" stop-color="#1FBFAD"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>

  <!-- Can body (wide cylinder, 120px × 190px — classic 330ml proportions) -->
  <rect x="140" y="120" width="120" height="190" fill="white" opacity="0.93"/>

  <!-- Bottom seam ellipse -->
  <ellipse cx="200" cy="310" rx="60" ry="15" fill="white" opacity="0.88"/>

  <!-- Top body ellipse -->
  <ellipse cx="200" cy="120" rx="60" ry="15" fill="white" opacity="0.95"/>

  <!-- Top seam taper (narrower than body — like real can lid area) -->
  <path d="M140 120 L152 100 L248 100 L260 120Z" fill="white" opacity="0.92"/>
  <ellipse cx="200" cy="100" rx="48" ry="12" fill="white" opacity="0.94"/>

  <!-- Pull tab ring -->
  <ellipse cx="200" cy="90" rx="14" ry="5"
           fill="none" stroke="white" stroke-width="5" opacity="0.72"/>

  <!-- Pull tab finger (rectangle with a hole — classic look) -->
  <rect x="196" y="76" width="8" height="18" rx="4" fill="white" opacity="0.82"/>

  <!-- Label area: horizontal cola-wave lines -->
  <path d="M146 175 Q175 167 200 175 Q225 183 254 175"
        stroke="white" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.30"/>
  <path d="M146 188 Q175 180 200 188 Q225 196 254 188"
        stroke="white" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.22"/>

  <!-- Bottom label stripe -->
  <rect x="140" y="270" width="120" height="5" rx="2" fill="#3FD4C2" opacity="0.28"/>

  <!-- Bubbles rising -->
  <circle cx="182" cy="240" r="5" fill="#3FD4C2" opacity="0.20"/>
  <circle cx="200" cy="218" r="4" fill="#3FD4C2" opacity="0.17"/>
  <circle cx="218" cy="252" r="3" fill="#3FD4C2" opacity="0.15"/>

  <!-- Logo -->
  <g transform="translate(352,356)" opacity="0.5">
    <text x="0" y="0" font-family="Arial" font-weight="800" font-size="20" fill="white">V</text>
  </g>
</svg>
