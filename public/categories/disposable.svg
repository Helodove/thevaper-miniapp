<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B9F36C"/>
      <stop offset="50%" stop-color="#3FD4C2"/>
      <stop offset="100%" stop-color="#1FBFAD"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>

  <!-- Disposable vape body (tall rounded rectangle) -->
  <rect x="158" y="100" width="84" height="220" rx="28" fill="white" opacity="0.93"/>

  <!-- Mouthpiece (slightly narrower, rounded at top) -->
  <rect x="170" y="78" width="60" height="38" rx="20" fill="white" opacity="0.90"/>

  <!-- Mouthpiece top ellipse (air hole hint) -->
  <ellipse cx="200" cy="78" rx="22" ry="8" fill="white" opacity="0.80"/>
  <ellipse cx="200" cy="76" rx="10" ry="5" fill="#3FD4C2" opacity="0.20"/>

  <!-- Air intake slits (left side) -->
  <rect x="155" y="195" width="6" height="22" rx="3" fill="#3FD4C2" opacity="0.22"/>
  <rect x="155" y="225" width="6" height="16" rx="3" fill="#3FD4C2" opacity="0.18"/>

  <!-- Air intake slits (right side) -->
  <rect x="239" y="195" width="6" height="22" rx="3" fill="#3FD4C2" opacity="0.22"/>
  <rect x="239" y="225" width="6" height="16" rx="3" fill="#3FD4C2" opacity="0.18"/>

  <!-- Label band in the middle -->
  <rect x="158" y="175" width="84" height="6" rx="3" fill="#3FD4C2" opacity="0.28"/>
  <rect x="158" y="248" width="84" height="6" rx="3" fill="#3FD4C2" opacity="0.28"/>

  <!-- LED indicator at bottom -->
  <ellipse cx="200" cy="305" rx="12" ry="5" fill="#B9F36C" opacity="0.60"/>

  <!-- Smoke wisps from mouthpiece -->
  <path d="M190 68 Q186 54 194 42 Q198 34 192 24"
        stroke="white" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.45"/>
  <path d="M200 64 Q204 50 200 38"
        stroke="white" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.30"/>
  <path d="M210 68 Q214 52 208 40"
        stroke="white" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.30"/>

  <!-- Logo -->
  <g transform="translate(352,356)" opacity="0.5">
    <text x="0" y="0" font-family="Arial" font-weight="800" font-size="20" fill="white">V</text>
  </g>
</svg>
